name: Noklingo
options:
  bundleIdPrefix: com.noklingo
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"

targets:
  Noklingo:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Noklingo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.noklingo.app
        INFOPLIST_FILE: Noklingo/Info.plist
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
